<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>V-Hub</title>

<style>
:root {
  --bg: var(--tg-theme-bg-color, #f4f4f4);
  --text: var(--tg-theme-text-color, #111);
  --button: var(--tg-theme-button-color, #2AABEE);
  --button-text: var(--tg-theme-button-text-color, #fff);
  --secondary: var(--tg-theme-secondary-bg-color, #ffffff);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

.card {
  background: var(--secondary);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 16px;
}

h1 {
  font-size: 22px;
  margin-bottom: 16px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  background: var(--button);
  color: var(--button-text);
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
}

.loader {
  text-align: center;
  padding: 20px;
  display: none;
  font-weight: 600;
}
</style>
</head>

<body>
<div class="container">
  <div id="app"></div>
  <div class="loader" id="loader">Завантаження...</div>
</div>

<script>
const SCRIPT_URL = "ВСТАВ СЮДИ СВОЄ ПОСИЛАННЯ НА GOOGLE APPS SCRIPT";

const tg = window.Telegram.WebApp;
tg.expand();

const tgUser = tg.initDataUnsafe?.user;
const tg_id = tgUser?.id;

const app = document.getElementById("app");
const loader = document.getElementById("loader");

function showLoader(show) {
  loader.style.display = show ? "block" : "none";
}

async function apiRequest(method, data) {
  showLoader(true);
  try {
    let response;

    if (method === "GET") {
      const params = new URLSearchParams(data).toString();
      response = await fetch(`${SCRIPT_URL}?${params}`);
    } else {
      response = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(data)
      });
    }

    const result = await response.json();
    showLoader(false);
    return result;
  } catch (err) {
    showLoader(false);
    alert("Помилка з'єднання із сервером");
  }
}

async function checkUser() {
  const result = await apiRequest("GET", {
    action: "getUser",
    tg_id: tg_id
  });

  if (!result || result.status === "not_found") {
    showRegistration();
  } else {
    showDashboard(result);
  }
}

function showRegistration() {
  app.innerHTML = `
    <div class="card">
      <h1>Реєстрація</h1>
      <input id="name" placeholder="Ваше ім'я" />
      <input id="age" type="number" placeholder="Вік" />
      <input id="location" placeholder="Місто" />
      <select id="role">
        <option value="Volunteer">Волонтер</option>
        <option value="Leader">Голова організації</option>
      </select>
      <div id="inviteField"></div>
      <button onclick="register()">Зареєструватися</button>
    </div>
  `;

  document.getElementById("role").addEventListener("change", (e) => {
    if (e.target.value === "Volunteer") {
      document.getElementById("inviteField").innerHTML =
        `<input id="org_code" placeholder="Код організації" />`;
    } else {
      document.getElementById("inviteField").innerHTML = "";
    }
  });

  document.getElementById("role").dispatchEvent(new Event("change"));
}

async function register() {
  const role = document.getElementById("role").value;
  const org_code = document.getElementById("org_code")?.value || "";

  const data = {
    action: "registerUser",
    tg_id: tg_id,
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    location: document.getElementById("location").value,
    role: role,
    org_id: org_code
  };

  const result = await apiRequest("POST", data);

  if (result.status === "success") {
    checkUser();
  } else {
    alert("Помилка реєстрації");
  }
}

function showDashboard(user) {
  if (user.Role === "Volunteer") {
    app.innerHTML = `
      <div class="card">
        <h1>Особистий кабінет</h1>
        <p>Вітаємо, ${user.Name}</p>
        <button onclick="showReportForm()">Здати звіт</button>
      </div>
    `;
  } else {
    const inviteCode = user.Org_ID || generateInviteCode();
    app.innerHTML = `
      <div class="card">
        <h1>Панель голови</h1>
        <p>Інвайт-код організації:</p>
        <h2>${inviteCode}</h2>
        <button onclick="openSheet()">Відкрити таблицю</button>
      </div>
    `;
  }
}

function showReportForm() {
  app.innerHTML = `
    <div class="card">
      <h1>Новий звіт</h1>
      <input id="category" placeholder="Категорія допомоги" />
      <textarea id="report_text" placeholder="Текст звіту"></textarea>
      <input id="hours" type="number" placeholder="Кількість годин" />
      <button onclick="submitReport()">Надіслати звіт</button>
    </div>
  `;
}

async function submitReport() {
  const data = {
    action: "submitReport",
    tg_id: tg_id,
    category: document.getElementById("category").value,
    report_text: document.getElementById("report_text").value,
    hours: document.getElementById("hours").value,
    photo_url: ""
  };

  const result = await apiRequest("POST", data);

  if (result.status === "success") {
    alert("Звіт успішно надіслано!");
    checkUser();
  } else {
    alert("Помилка відправки");
  }
}

function openSheet() {
  window.open("https://docs.google.com/spreadsheets/", "_blank");
}

function generateInviteCode() {
  return Math.random().toString(36).substring(2, 8).toUpperCase();
}

if (!tg_id) {
  app.innerHTML = "<p>Будь ласка, відкрийте застосунок через Telegram</p>";
} else {
  checkUser();
}
</script>
</body>
</html>
